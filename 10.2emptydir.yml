apiVersion: v1 
kind: Pod
metadata:
  name: cache-pod
  labels:
    app: "test"
spec:
  containers:
  - name: container1
    image: nginxdemos/hello:plain-text
    ports:
    - containerPort:  80
      name:  http
    volumeMounts:
    - name: cache-temp
      mountPath: /cache-temp
  volumes:
    - name: cache-temp
      emptyDir: 
  restartPolicy: Always