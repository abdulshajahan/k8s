apiVersion: v1
kind: Pod
metadata:
  name: hostpathpod
spec:
  containers:
  - image: nginx
    name: test-container
    volumeMounts:
      - mountPath: "/usr/share/nginx/html"
        name: test-hostpath
  volumes:
  - name: test-hostpath
    hostPath:
      path: /testdata1234
      type: DirectoryOrCreate #if dir not available create new