apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-deploy-nodeport
  labels:
    app: nginx

spec:
  replicas: 4
  selector:
    matchLabels:
      app: nginx
      #env: prod
  template:
    metadata:
      labels:
        app: nginx
        env: qa #will be used for service binding
    spec:
      containers:
      - name: nginx
        image: nginxdemos/hello:plain-text #latest #<<<nginx:1.16.1<<< #nginx:1.14.2
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: democlusterip
  namespace: default
spec:
  selector:
    env: qa
  #type: ClusterIP
  type: NodePort
  ports:
  - name: demosport
    protocol: TCP
    port: 80 #service port
    targetPort: 80 #pod port
    nodePort: 30001 #port range 30000-32767


  # 612  k apply -f 9.nodeport-service-deployplaintext.yml 
  # 613  k get pods,svc
  # 614  curl http://node1:30001
  # 615  curl http://node2:30001